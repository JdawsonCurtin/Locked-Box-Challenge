<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Challenge Time</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: radial-gradient(circle at center, #0a0f1c, #000);
      color: #00ffd5;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 { margin-bottom: 10px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .timer-card {
      background: rgba(0,0,0,0.7);
      border: 1px solid #00ffd5;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 0 15px rgba(0,255,213,0.3);
    }

    .timer-display {
      font-size: 32px;
      margin: 10px 0;
    }

    .warning {
      color: red;
      animation: flash 1s infinite;
    }

    @keyframes flash {
      0%,100%{opacity:1;}50%{opacity:0.4;}
    }

    input, button {
      padding: 6px;
      margin: 3px;
      border-radius: 5px;
      border: none;
    }

    button { cursor: pointer; background:#00ffd5; }

    #leaderboard {
      margin-top: 20px;
      background: rgba(0,0,0,0.7);
      padding: 15px;
      border-radius: 10px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 0 20px rgba(0,255,213,0.3);
    }

    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      background: red;
      z-index: 9999;
      pointer-events: none;
      opacity: 0.8;
      animation: fall 3s linear forwards;
    }

    @keyframes fall {
      0% { transform: translateY(-10px) rotate(0deg); }
      100% { transform: translateY(100vh) rotate(360deg); }
    }
  </style>
</head>
<body>

<h1>⏳ Challenge Time</h1>
<div id="setupSection">
  <label>Set Time (seconds) for all groups: </label>
  <input type="number" id="globalTime">
  <label>Set Passcode for all groups: </label>
  <input type="password" id="globalPass">
  <button onclick="startAllTimers()">Start Challenge</button>
</div>

<div class="grid" id="grid"></div>

<h2>🏆 Leaderboard</h2>
<ol id="leaderboard"></ol>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let leaderboard = [];
let globalPass = '';

function playSuccess() {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.frequency.setValueAtTime(400, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.3);
  gain.gain.value = 0.2;
  osc.start();
  osc.stop(audioCtx.currentTime + 0.4);
}

function playAlarm() {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.frequency.value = 200;
  gain.gain.value = 0.2;
  osc.start();
  setTimeout(() => osc.stop(), 1000);
}

function launchConfetti() {
  for (let i=0; i<100; i++) {
    const confetti = document.createElement('div');
    confetti.className = 'confetti-piece';
    confetti.style.background = `hsl(${Math.random()*360}, 100%, 50%)`;
    confetti.style.left = Math.random()*100 + 'vw';
    confetti.style.animationDuration = (2+Math.random()*2)+'s';
    document.body.appendChild(confetti);
    setTimeout(()=>confetti.remove(), 3000);
  }
}

class Timer {
  constructor(id) {
    this.id = id;
    this.timeLeft = 0;
    this.interval = null;
    this.escaped = false;
    this.createUI();
  }

  createUI() {
    const card = document.createElement('div');
    card.className = 'timer-card';

    card.innerHTML = `
      <h3>Group ${this.id}</h3>
      <div class="timer-display" id="display-${this.id}">00:00</div>
      <input type="password" placeholder="Enter password" id="entry-${this.id}">
      <button onclick="timers[${this.id}].stop()">Unlock</button>
    `;

    document.getElementById('grid').appendChild(card);
  }

  start(globalTime, passcode) {
    clearInterval(this.interval);
    this.timeLeft = globalTime;
    this.passcode = passcode;
    this.escaped = false;

    this.interval = setInterval(() => {
      this.timeLeft--;
      this.update();
      if (this.timeLeft <= 30) document.getElementById(`display-${this.id}`).classList.add('warning');
      if (this.timeLeft <= 0) {
        clearInterval(this.interval);
        if (!this.escaped) alert(`💀 Group ${this.id} failed!`);
        playAlarm();
      }
    }, 1000);
  }

  update() {
    let m = Math.floor(this.timeLeft/60);
    let s = this.timeLeft%60;
    document.getElementById(`display-${this.id}`).innerText = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }

  stop() {
    const entered = document.getElementById(`entry-${this.id}`).value;
    if (!this.escaped && entered === this.passcode) {
      clearInterval(this.interval);
      this.escaped = true;
      playSuccess();
      launchConfetti();
      const display = document.getElementById(`display-${this.id}`);
      display.innerText = 'ESCAPED!';
      display.style.color = '#00ff00';
      document.getElementById(`entry-${this.id}`).style.display = 'none';
      leaderboard.push(`Group ${this.id}`);
      this.updateLeaderboard();
      alert(`🎉 Group ${this.id} escaped!`);
    } else if (!this.escaped) {
      alert('❌ Wrong password');
    }
  }

  updateLeaderboard() {
    const lb = document.getElementById('leaderboard');
    lb.innerHTML = leaderboard.map(group=>`<li>${group}</li>`).join('');
  }
}

let timers = {};
for (let i = 1; i <= 10; i++) timers[i] = new Timer(i);

function startAllTimers() {
  const globalTime = parseInt(document.getElementById('globalTime').value);
  const globalPass = document.getElementById('globalPass').value;
  for (let i=1; i<=10; i++) {
    timers[i].start(globalTime, globalPass);
  }

  document.getElementById('setupSection').style.display = 'none';
}
</script>

</body>
</html>
